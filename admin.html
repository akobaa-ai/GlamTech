<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Administración</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { font-family: sans-serif; padding: 1rem; }
    #login-container, #panel-admin { max-width: 600px; margin: auto; }
    #panel-admin { display: none; }
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    th, td { border: 1px solid #ccc; padding: 0.5rem; text-align: left; }
    th { background: #eee; }
  </style>
</head>
<body>

<div id="login-container">
  <h2>Acceso al Panel</h2>
  <input type="password" id="admin-pass" placeholder="Contraseña">
  <button id="login-btn">Entrar</button>
  <p id="login-error" style="color:red;display:none;">Contraseña incorrecta</p>
</div>

<div id="panel-admin">
  <h2>Pedidos Recibidos</h2>
  <table id="pedidos-table">
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Dirección</th>
        <th>Teléfono</th>
        <th>Productos</th>
        <th>Total</th>
        <th>Fecha</th>
      </tr>
    </thead>
    <tbody id="pedidos-body">
      <tr><td colspan="6">Cargando...</td></tr>
    </tbody>
  </table>
  <button id="cerrar-panel">Cerrar sesión</button>
</div>

<script src="admin.js"></script>
</body>
</html>
